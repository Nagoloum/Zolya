name: zolya
description: Marketplace C2C de vêtements d'occasion — Douala
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  bloc: ^8.1.4

  # Dependency injection
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^6.0.3

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Functional programming
  dartz: ^0.10.1

  # Image / Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Video
  video_player: ^2.9.1

  # UI — Composants
  shadcn_ui: ^0.27.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  gap: ^3.0.1
  pinput: ^5.0.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.0

  # UI — Animations & loading states
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  skeletonizer: ^2.1.3
  shimmer: ^3.0.0

  # Formatting / Localization
  intl: ^0.20.2

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.6.2
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
